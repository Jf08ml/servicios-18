# Producción (VPS + Dokploy). Variables: ver .env.production.example
#
# Primer despliegue / cambios de esquema:
#   docker compose -f docker-compose.prod.yml --profile tools run --rm migrate
# Seed inicial (revisa prisma/seed.ts antes — crea cuentas de prueba):
#   docker compose -f docker-compose.prod.yml --profile tools run --rm migrate npm run db:seed

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD}
      POSTGRES_DB: servicios18
    # Sin ports: solo accesible desde la red interna de Docker.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d servicios18"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/servicios18?schema=public
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    volumes:
      # Aquí viven avatares, verificaciones, hoteles y galería (src/lib/uploads.ts).
      - uploads:/app/uploads
    expose:
      - "3000"
    networks:
      - default
      # Red de Traefik/Dokploy para exponer el dominio con HTTPS.
      # Si NO usas Dokploy: elimina dokploy-network de aquí y del bloque
      # networks del final, y reemplaza `expose` por `ports: ["3000:3000"]`.
      - dokploy-network

  # Aplica el esquema de Prisma contra la BD de producción (no arranca solo).
  migrate:
    profiles: ["tools"]
    build:
      context: .
      target: deps
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/servicios18?schema=public
    command: npx prisma db push --skip-generate

volumes:
  pgdata:
  uploads:

networks:
  dokploy-network:
    external: true
