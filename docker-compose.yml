services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      # Solo para desarrollo local (localhost:5434). Sobreescribible vía .env.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: servicios18
    ports:
      # 5434 en el host para no chocar con instancias locales de PostgreSQL
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
